name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  public-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pytest

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Rust formatting
        run: cargo fmt --check

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --all-targets --all-features

      - name: Rust docs
        run: cargo test --doc

      - name: Python contract tests
        env:
          MEMPHANT_ALLOW_MISSING_PRIVATE_REPO: "1"
        run: python -m pytest tests -q

      - name: Golden verification
        run: cargo run -p memphant-eval -- verify-golden examples/evals/golden.yaml

      - name: Sampled benchmark
        run: cargo run -p memphant-eval -- run benchmarks/nightly-sampled.yaml --archive-traces --archive-dir docs/build-log/artifacts

      - name: Security smoke
        run: cargo run -p memphant-eval -- security examples/evals/security-smoke.yaml

      - name: Provider exposure checks
        run: |
          cargo run -p memphant-cli -- db bootstrap-check --provider plain-postgres
          cargo run -p memphant-cli -- db bootstrap-check --provider supabase
          cargo run -p memphant-cli -- db bootstrap-check --provider neon

      - name: Web launch surface
        working-directory: web
        run: npm test
